<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>gmax's New Page</title>
<style>
/* ОСНОВНАЯ СТРУКТУРА */
html, body { height: 100%; margin: 0; overflow: hidden; }
body { background: #202124; font-family: 'Segoe UI', Tahoma, sans-serif; color: #e8eaed; display: flex; flex-direction: column; }

/* ПАНЕЛЬ ЗАКЛАДОК */
#bookmarks-bar {
    width: 100%; background: #2b2c2f; padding: 2px 10px; display: flex; flex-direction: row; gap: 4px;
    overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #3c4043; box-sizing: border-box;
    min-height: 32px; align-items: center; z-index: 10;
}
.bm-link { color: #e8eaed; text-decoration: none; font-size: 12px; opacity: 0.9; padding: 4px 6px; border-radius: 4px; display: flex; align-items: center; gap: 5px; transition: background 0.2s; }
.bm-link:hover { background: #3c4043; }
.bm-link img { width: 16px; height: 16px; border-radius: 2px; object-fit: contain; }

/* КОНТЕЙНЕР ПЛИТОК */
.main-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 10vh; box-sizing: border-box; overflow-y: auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, 110px); gap: 22px; max-width: 1100px; width: 100%; justify-content: center; padding: 20px; }
.tile-wrapper { position: relative; width: 110px; height: 110px; }
.tile { width: 110px; height: 110px; background: #2b2c2f; border-radius: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-decoration: none; color: #e8eaed; transition: 0.15s; overflow: hidden; }
.tile:hover { background: #3a3b3f; transform: translateY(-5px); }

/* КАРТИНКИ И СКРУГЛЕНИЯ */
.tile img { width: 56px; height: 56px; margin-bottom: 6px; border-radius: 20px; object-fit: cover; }
.tile span { font-size: 12px; opacity: 0.9; text-align: center; width: 80%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* 🔥 ФИЛЬТР ДЛЯ ГОЛУБЫХ ИКОНОК */
.img-blue-recolor {
    filter: brightness(0) invert(1) sepia(100%) saturate(10000%) hue-rotate(175deg);
}

/* ИНТЕРФЕЙС РЕДАКТИРОВАНИЯ */
.edit-btn { position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; background: rgba(0,0,0,0.3); border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 10; border: none; color: white; }
.tile-wrapper:hover .edit-btn { display: flex; }
.add-tile { border: 2px dashed #3c4043; background: transparent; cursor: pointer; }
.add-tile span { font-size: 30px; opacity: 0.5; }

/* МОДАЛКА */
#modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; }
.modal { background: #2b2c2f; padding: 24px; border-radius: 20px; width: 320px; }
.modal input { width: 100%; background: #202124; border: 1px solid #3c4043; color: #e8eaed; padding: 10px; margin-bottom: 12px; border-radius: 8px; box-sizing: border-box; }
.modal-buttons { display: flex; justify-content: flex-end; gap: 10px; }
.btn { padding: 8px 16px; border-radius: 8px; cursor: pointer; border: none; font-size: 13px; }
.btn-save { background: #8ab4f8; color: #202124; }
.btn-delete { background: #f28b82; color: #202124; margin-right: auto; }
</style>
</head>
<body>

<div id="bookmarks-bar"></div>
<div class="main-wrapper">
    <div class="grid" id="mainGrid"></div>
</div>

<div id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle">Edit Item</h3>
        <input type="text" id="inputName" placeholder="Title">
        <input type="text" id="inputUrl" placeholder="URL">
        <input type="text" id="inputImg" placeholder="Icon URL">
        <div class="modal-buttons">
            <button class="btn btn-delete" id="btnDelete">Delete</button>
            <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn btn-save" onclick="saveModal()">Save</button>
        </div>
    </div>
</div>

<script>
const grid = document.getElementById('mainGrid');
const bar = document.getElementById('bookmarks-bar');
const modalOverlay = document.getElementById('modalOverlay');

const ARBO_ICON = 'https://static.crozdesk.com/web_app_library/providers/logos/000/008/958/box/arbostar-1669211443-logo.png?1669211443';

// 🔥 ВСЕ ТВОИ ПЛИТКИ ИЗ СКРИНШОТА
const defaultTiles = [
    { title: 'YouTube', href: 'https://youtube.com', icon: '' },
    { title: 'Main', href: 'https://mail.google.com', icon: '' },
    { title: 'Stud', href: 'https://mail.google.com', icon: '' },
    { title: 'Jira', href: 'https://arbostar.atlassian.net', icon: 'https://www.atlassian.com/favicon.ico' },
    { title: 'Speedtest', href: 'https://www.speedtest.net', icon: '' },
    { title: 'Jabko', href: 'https://jabko.ua', icon: '' },
    { title: 'Checklist', href: 'https://docs.google.com', icon: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Google_Keep_icon_%282020%29.svg/1024px-Google_Keep_icon_%282020%29.svg.png' },
    { title: 'Hotfix', href: 'https://hotfix.arbostar.com', icon: ARBO_ICON },
    { title: 'Staging', href: 'https://staging.arbostar.com', icon: ARBO_ICON },
    { title: 'Parallel', href: 'https://parallel.arbostar.com', icon: ARBO_ICON },
    { title: 'Gravity', href: 'https://gravity.arbostar.com', icon: ARBO_ICON },
    { title: 'Gravity PDF', href: 'https://gravitypdf.arbostar.com', icon: ARBO_ICON },
    { title: 'Multipass', href: 'https://multipass.arbostar.com', icon: ARBO_ICON },
    { title: 'Moon', href: 'https://moon.arbostar.com', icon: ARBO_ICON },
    { title: 'Capacitor', href: 'https://capacitor.arbostar.com', icon: ARBO_ICON },
    { title: 'BugFixApp', href: 'https://bugfixapp.arbostar.com', icon: ARBO_ICON },
    { title: 'Franchise', href: 'https://franchise.arbostar.com', icon: ARBO_ICON },
    { title: 'MoonThousand', href: 'https://moonthousand.arbostar.com', icon: ARBO_ICON },
    { title: 'OLX', href: 'https://olx.ua', icon: '' }
];

let tilesData = JSON.parse(localStorage.getItem('tiles_order')) || defaultTiles;
let bookmarksData = JSON.parse(localStorage.getItem('custom_bookmarks')) || [];

function getFavicon(url) { return `https://www.google.com/s2/favicons?sz=64&domain=${url}`; }

function renderGrid() {
    grid.innerHTML = '';
    const blueNames = ['bugfix', 'capacitor', 'franchise'];

    tilesData.forEach((item, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'tile-wrapper';
        
        const isBlue = blueNames.some(n => item.title.toLowerCase().includes(n));
        const imgClass = isBlue ? 'img-blue-recolor' : '';
        const iconSrc = item.icon || getFavicon(item.href);

        wrapper.innerHTML = `
            <button class="edit-btn" onclick="openModal('tile', ${index})">⋮</button>
            <a class="tile" href="${item.href}">
                <img src="${iconSrc}" class="${imgClass}" onerror="this.src='https://www.google.com/favicon.ico'">
                <span>${item.title}</span>
            </a>
        `;
        grid.appendChild(wrapper);
    });

    const addBtn = document.createElement('div');
    addBtn.className = 'tile add-tile';
    addBtn.innerHTML = '<span>+</span>';
    addBtn.onclick = () => openModal('tile', null);
    grid.appendChild(addBtn);
}

function renderBookmarks() {
    bar.innerHTML = '';
    bookmarksData.forEach((bm, index) => {
        const a = document.createElement('a');
        a.className = 'bm-link';
        a.href = bm.url;
        a.innerHTML = `<img src="${getFavicon(bm.url)}"> ${bm.title}`;
        bar.appendChild(a);
    });
}

function openModal(type, index) {
    currentEditIndex = index;
    const btnDelete = document.getElementById('btnDelete');
    if (index !== null) {
        document.getElementById('inputName').value = tilesData[index].title;
        document.getElementById('inputUrl').value = tilesData[index].href;
        document.getElementById('inputImg').value = tilesData[index].icon || '';
        btnDelete.style.display = 'block';
        btnDelete.onclick = () => { tilesData.splice(index, 1); save(); };
    } else {
        document.getElementById('inputName').value = '';
        document.getElementById('inputUrl').value = '';
        document.getElementById('inputImg').value = '';
        btnDelete.style.display = 'none';
    }
    modalOverlay.style.display = 'flex';
}

function closeModal() { modalOverlay.style.display = 'none'; }

function saveModal() {
    const newItem = {
        title: document.getElementById('inputName').value,
        href: document.getElementById('inputUrl').value,
        icon: document.getElementById('inputImg').value
    };
    if (currentEditIndex !== null) tilesData[currentEditIndex] = newItem;
    else tilesData.push(newItem);
    save();
}

function save() {
    localStorage.setItem('tiles_order', JSON.stringify(tilesData));
    renderGrid();
    closeModal();
}

window.addEventListener('DOMContentLoaded', () => { renderGrid(); renderBookmarks(); });
</script>
</body>
</html>
